name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-03-27
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip1

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2 @ 2026-03-12

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (plugin, wasm)
        # --lib because the plugin is a cdylib only.
        # --no-deps lints our code, not transitive deps.
        run: cargo clippy -p roger --target wasm32-wasip1 --all-features --lib --no-deps -- -D warnings

      - name: Clippy (shim, host)
        run: cargo clippy -p roger-shim --all-features --all-targets --no-deps -- -D warnings

      - name: Test proto (host)
        # Pure crate, no zellij-tile — host-target tests work here
        # where they can't on the plugin crate. See #36.
        run: cargo test -p roger-proto

      - name: Build plugin (wasm)
        run: cargo build --release -p roger --target wasm32-wasip1

      - name: Build shim (host)
        run: cargo build --release -p roger-shim

      - name: Upload artifacts (plugin + shim)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: roger-artifacts-${{ github.sha }}
          path: |
            target/wasm32-wasip1/release/roger.wasm
            target/release/tmux
          if-no-files-found: error
          retention-days: 14

  commit-lint:
    name: commit lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1 @ 2025-01-14
        with:
          configFile: .commitlintrc.yml
