# Cargo aliases so the README, CONTRIBUTING.md, and CI all refer to
# the same canonical commands. Aliases stay in sync with the workflow
# at .github/workflows/ci.yml.
#
# The workspace has two crates: `roger` (the plugin, Wasm) and
# `roger-shim` (the host-target shim binary named `tmux`). Aliases are
# split per crate because no single cargo invocation can lint or build
# a mixed-target workspace correctly (the plugin needs
# --target wasm32-wasip1; the shim does not).

[alias]
# Plugin (Wasm target).
build-wasm   = "build --release -p roger --target wasm32-wasip1"
check-plugin = "clippy -p roger --target wasm32-wasip1 --all-features --lib --no-deps -- -D warnings"

# Shim (host target).
build-shim = "build --release -p roger-shim"
check-shim = "clippy -p roger-shim --all-features --all-targets --no-deps -- -D warnings"

# Proto (host target — pure crate, host-testable).
test-proto  = "test -p roger-proto"
check-proto = "clippy -p roger-proto --all-features --all-targets --no-deps -- -D warnings"
