# Cargo aliases so the README, CONTRIBUTING.md (#3), and CI all
# refer to the same canonical commands. Aliases stay in sync with
# the workflow at .github/workflows/ci.yml.

[alias]
# Release build of the Wasm plugin, matching CI exactly.
build-wasm = "build --release --target wasm32-wasip1"

# Full local check: format + lint, matching CI exactly.
# Run via `cargo check-all` before pushing.
check-all  = "clippy --target wasm32-wasip1 --all-features --lib --no-deps -- -D warnings"
